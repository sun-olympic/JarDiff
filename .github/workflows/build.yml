name: Build JarDiff (mac + windows)

# 触发方式：
#   - 手动：Actions 页面点 "Run workflow"
#   - 打 tag：git tag v1.0.0 && git push origin v1.0.0  -> 自动构建并发布 Release
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ===================== macOS：自包含 .app + 未公证 DMG =====================
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖到 .venv
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install pywebview pyinstaller pillow

      - name: 生成图标 (icns + ico)
        run: .venv/bin/python make_icon.py

      - name: 打包 + Ad-hoc 签名 + DMG
        run: ADHOC=1 ./build_dmg.sh

      - name: 上传 DMG 产物
        uses: actions/upload-artifact@v4
        with:
          name: JarDiff-macOS-dmg
          path: dist_pyinstaller/JarDiff.dmg
          if-no-files-found: error

  # ===================== Windows：自包含 exe + 安装程序 =====================
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r packaging/requirements-windows.txt

      - name: 生成图标 (ico)
        run: python make_icon.py

      - name: PyInstaller 打包
        run: pyinstaller --noconfirm jardiff.spec

      - name: 安装 Inno Setup
        run: choco install innosetup -y --no-progress

      - name: 编译安装程序
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\jardiff_inno.iss'

      - name: 打包绿色版为 zip
        run: Compress-Archive -Path dist\JarDiff\* -DestinationPath dist\JarDiff-portable.zip

      - name: 上传 Windows 产物
        uses: actions/upload-artifact@v4
        with:
          name: JarDiff-Windows
          path: |
            dist_installer/*.exe
            dist/JarDiff-portable.zip
          if-no-files-found: error

  # ===================== 打 tag 时：把两端产物发布到 Release =====================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.zip
          generate_release_notes: true
